# GitHub Actions CI — runs on every push and pull request to main.
# View results: repo → Actions tab on GitHub.
#
# What this does:
#   1. Install dependencies (pnpm via Corepack)
#   2. Typecheck (same as: pnpm check / tsc --noEmit)
#   3. Unit tests (same as: pnpm test)
#
# Tests that need secrets from .env (e.g. ELEVEN_LABS_API_KEY) skip themselves when
# those vars are unset. CI does not inject .env keys.
#
# It does NOT deploy. It only checks that the code is healthy.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Corepack ships with Node and is more reliable than a separate pnpm action
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm check

      - name: Unit tests
        run: pnpm test
